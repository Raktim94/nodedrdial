version: '3.9'

# ============================================================
# TwilioHub OSS — Docker Compose
# Run with: docker compose up -d
# ============================================================

x-restart-policy: &restart-policy
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 40s

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *restart-policy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twiliohub}
      POSTGRES_USER: ${POSTGRES_USER:-twiliohub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twiliohub} -d ${POSTGRES_DB:-twiliohub}"]
      <<: *healthcheck-defaults

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *restart-policy
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *healthcheck-defaults

  # ── Backend API (NestJS) ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    <<: *restart-policy
    environment:
      NODE_ENV: production
      APP_PORT: 3001
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-twiliohub}
      POSTGRES_USER: ${POSTGRES_USER:-twiliohub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      UPLOAD_DIR: /app/uploads
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-google/gemini-2.0-flash-exp:free}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      SETUP_COMPLETED: ${SETUP_COMPLETED:-false}
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      <<: *healthcheck-defaults

  # ── Frontend (Next.js) ───────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    <<: *restart-policy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${APP_URL:-http://localhost}/api
      NEXT_PUBLIC_WS_URL: ${APP_URL:-http://localhost}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      <<: *healthcheck-defaults

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    <<: *restart-policy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads_data:/var/www/uploads:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      <<: *healthcheck-defaults

  # ── Automated Backups ─────────────────────────────────────
  backup:
    image: postgres:16-alpine
    <<: *restart-policy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-twiliohub}
      POSTGRES_USER: ${POSTGRES_USER:-twiliohub}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - backups_data:/backups
      - ./docker/backups/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c", "crond -f -d 8"]
    command: []
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  backups_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  default:
    name: twiliohub_network
