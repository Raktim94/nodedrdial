name: Claude Code Check

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verify-claude-code:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude Code version
        run: claude --version

      - name: Run Claude Code (safe non-interactive test)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Say hello and confirm you are running inside GitHub Actions CI on Debian/Ubuntu." \
            --output-format json \
            --max-turns 1
